<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arcon Kozmetik — Belge üretimi</title>
    <style>
      :root {
        font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
        --bg: #f2f4f8;
        --panel: #ffffff;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #dbe1ea;
        --soft: #eef2f7;
        --accent: #f97316;
        --accent-dark: #ea580c;
        --ok-bg: #e8f8ed;
        --ok-text: #14532d;
        --err-bg: #fef2f2;
        --err-text: #991b1b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }
      .layout {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .shell {
        width: min(840px, 100%);
      }
      .left {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
      }
      .left {
        padding: 28px;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        color: #334155;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: #f8fafc;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 10px;
      }
      h1 {
        margin: 14px 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }
      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 15px;
      }
      .guide {
        margin: 0 0 20px;
        background: #f8fafc;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        font-size: 14px;
      }
      .uploader {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        padding: 14px;
      }
      .upload-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .upload-title {
        font-weight: 700;
        font-size: 14px;
      }
      .upload-hint {
        color: var(--muted);
        font-size: 12px;
      }
      .pick-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .pick-btn {
        position: relative;
        overflow: hidden;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        padding: 9px 12px;
        cursor: pointer;
      }
      .pick-btn:hover {
        background: #f1f5f9;
      }
      .filename {
        flex: 1;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 13px;
        color: #334155;
        background: #f8fafc;
        display: flex;
        align-items: center;
      }
      #fileInput {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }
      .action-btn {
        margin-top: 12px;
        width: 100%;
        height: 44px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .action-btn:hover:not(:disabled) {
        background: var(--accent-dark);
      }
      .action-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .msg {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        display: none;
      }
      .msg.show {
        display: block;
      }
      .msg.ok {
        background: var(--ok-bg);
        color: var(--ok-text);
      }
      .msg.err {
        background: var(--err-bg);
        color: var(--err-text);
      }
      .status-row {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }
      .module-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }
      .module-card {
        display: block;
        border: 2px solid var(--line);
        border-radius: 12px;
        padding: 12px 12px 12px 38px;
        cursor: pointer;
        position: relative;
        background: #fafbfc;
        transition: border-color 0.15s, background 0.15s;
      }
      .module-card:hover {
        border-color: #cbd5e1;
        background: #fff;
      }
      .module-card input {
        position: absolute;
        left: 12px;
        top: 14px;
        accent-color: var(--accent);
      }
      .module-card:has(input:checked) {
        border-color: var(--accent);
        background: #fff8f3;
        box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.25);
      }
      .module-card strong {
        display: block;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .module-card span {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
      }
      @media (max-width: 900px) {
        h1 {
          font-size: 24px;
        }
      }
      .loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: rgba(15, 23, 42, 0.42);
        backdrop-filter: blur(3px);
      }
      .loading-overlay[hidden] {
        display: none !important;
      }
      .loading-box {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 26px 32px;
        text-align: center;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.18);
        min-width: 280px;
        max-width: min(360px, 92vw);
      }
      .loading-title {
        margin: 8px 0 0;
        font-size: 15px;
        font-weight: 700;
        color: var(--ink);
      }
      .loading-stage {
        margin: 8px 0 0;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        min-height: 1.35em;
      }
      .progress-track {
        margin-top: 16px;
        height: 9px;
        border-radius: 999px;
        background: var(--soft);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent-dark), var(--accent));
        transition: width 0.18s ease-out;
      }
      .loading-pct {
        margin-top: 10px;
        font-size: 13px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--accent-dark);
      }
      .spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 0;
        border-radius: 50%;
        border: 3px solid var(--line);
        border-top-color: var(--accent);
        animation: spin 0.65s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="shell">
        <article class="left">
          <div class="brand">ARCON KOZMETİK</div>
          <h1 id="pageTitle">Belge üretimi</h1>
          <p class="subtitle" id="pageSubtitle">Excel yükleyin, modülü seçin, ZIP olarak indirin.</p>

          <p class="guide" id="guideBox">
            Modül seçildiğinde buradaki açıklama güncellenir.
          </p>

          <form id="form" class="uploader">
            <div class="module-grid" role="radiogroup" aria-label="Modül seçimi">
              <label class="module-card">
                <input type="radio" name="module" value="iade" checked />
                <strong>İade reddi yazısı</strong>
                <span>RED satırları → her satır için bir Word dosyası; çıktılar tek ZIP içinde.</span>
              </label>
              <label class="module-card">
                <input type="radio" name="module" value="teslim" />
                <strong>Teslim tutanağı</strong>
                <span>Aynı takip numarasındaki satırlar tek belgede; dosya adı takip no ve (varsa) mağaza.</span>
              </label>
            </div>
            <div class="upload-head">
              <div class="upload-title">Excel dosyası</div>
              <div class="upload-hint">.xlsx veya .xls</div>
            </div>
            <div class="pick-row">
              <label class="pick-btn">
                Dosya seç
                <input id="fileInput" type="file" name="file" accept=".xlsx,.xls" required />
              </label>
              <div id="selectedFile" class="filename">Henüz dosya seçilmedi</div>
            </div>
            <button type="submit" id="btn" class="action-btn">ZIP oluştur ve indir</button>
          </form>

          <div id="msg" class="msg"></div>
          <div class="status-row" id="statusRow"></div>
        </article>

      </section>
    </main>

    <div
      id="loadingOverlay"
      class="loading-overlay"
      hidden
      role="status"
      aria-live="polite"
      aria-label="ZIP hazırlanıyor"
      aria-hidden="true"
    >
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-title">ZIP hazırlanıyor</p>
        <p class="loading-stage" id="loadingStage">Başlanıyor…</p>
        <div
          id="loadingProgressBar"
          class="progress-track"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-valuetext="0%"
        >
          <div id="loadingProgressFill" class="progress-fill"></div>
        </div>
        <div class="loading-pct" id="loadingPercent">0%</div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      const fileInput = document.getElementById("fileInput");
      const selectedFile = document.getElementById("selectedFile");
      const statusRow = document.getElementById("statusRow");
      const pageTitle = document.getElementById("pageTitle");
      const pageSubtitle = document.getElementById("pageSubtitle");
      const guideBox = document.getElementById("guideBox");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const loadingProgressFill = document.getElementById("loadingProgressFill");
      const loadingPercent = document.getElementById("loadingPercent");
      const loadingStage = document.getElementById("loadingStage");
      const loadingProgressBar = document.getElementById("loadingProgressBar");

      const MOCK_STAGES_TR = [
        { min: 0, text: "Dosya sunucuya iletililiyor…" },
        { min: 10, text: "Excel okunuyor…" },
        { min: 26, text: "Satırlar ve mağaza bilgileri işleniyor…" },
        { min: 42, text: "Word belgeleri oluşturuluyor…" },
        { min: 58, text: "Tablolar ve metinler yerleştiriliyor…" },
        { min: 72, text: "ZIP arşivi hazırlanıyor…" },
        { min: 84, text: "Son kontroller…" },
      ];

      let mockProgressTimer = null;
      let mockDisplayedPct = 0;

      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      function stopMockProgress() {
        if (mockProgressTimer != null) {
          clearInterval(mockProgressTimer);
          mockProgressTimer = null;
        }
      }

      function stageTextForPct(pct) {
        let text = MOCK_STAGES_TR[0].text;
        for (const s of MOCK_STAGES_TR) {
          if (pct >= s.min) text = s.text;
        }
        return text;
      }

      function setProgressUI(pct, overrideStatus) {
        const p = Math.min(100, Math.max(0, pct));
        loadingProgressFill.style.width = `${p}%`;
        loadingPercent.textContent = `${Math.round(p)}%`;
        loadingStage.textContent =
          overrideStatus != null ? overrideStatus : stageTextForPct(p);
        const rounded = Math.round(p);
        loadingProgressBar.setAttribute("aria-valuenow", String(rounded));
        loadingProgressBar.setAttribute("aria-valuetext", `${rounded}%`);
      }

      function startMockProgress() {
        stopMockProgress();
        mockDisplayedPct = 3;
        setProgressUI(mockDisplayedPct);
        mockProgressTimer = setInterval(() => {
          if (mockDisplayedPct >= 86) return;
          const room = 86 - mockDisplayedPct;
          const bump = Math.max(0.45, room * (0.055 + Math.random() * 0.095));
          mockDisplayedPct = Math.min(86, mockDisplayedPct + bump);
          setProgressUI(mockDisplayedPct);
        }, 340);
      }

      function setLoading(on) {
        loadingOverlay.hidden = !on;
        loadingOverlay.setAttribute("aria-hidden", on ? "false" : "true");
        document.body.style.overflow = on ? "hidden" : "";
        if (!on) {
          stopMockProgress();
          mockDisplayedPct = 0;
          setProgressUI(0, "Başlanıyor…");
        }
      }

      const copy = {
        iade: {
          title: "İade reddi yazıları",
          subtitle:
            "Mağaza ve müşteri bilgileriyle hazır Word belgeleri üretmek için Excel’inizi yükleyin.",
          guide:
            "Yalnızca <strong>İNCELEMDEN SONRA DURUM</strong> sütununda <strong>RED</strong> olan satırlar işlenir. Her satır ayrı bir <strong>.docx</strong> dosyasıdır; tümü tek <strong>ZIP</strong> içinde indirilir. Dosya adları barkod, stok adı ve (varsa) mağaza alanına göre verilir.",
          btn: "İade yazılarını ZIP olarak indir",
          zip: "iade-yazilari.zip",
        },
        teslim: {
          title: "Teslim tutanağı",
          subtitle:
            "Aynı takip numarasındaki ürünleri tek tutanakta toplamak için Excel’inizi yükleyin.",
          guide:
            "Her farklı <strong>Takip No</strong> için bir <strong>.docx</strong> oluşturulur. <strong>Belge No</strong> takip numarasıdır; <strong>Teslim Edilen Mağaza</strong> Excel’deki mağaza alanından okunur. Ürün tablosu, imza alanları ve elle yazılmak üzere boş satırlar belgede yer alır.",
          btn: "Tutanakları ZIP olarak indir",
          zip: "teslim-tutanaklari.zip",
        },
      };

      function applyModuleUi() {
        const mod = form.querySelector('input[name="module"]:checked')?.value || "iade";
        const c = copy[mod] || copy.iade;
        pageTitle.textContent = c.title;
        pageSubtitle.innerHTML = c.subtitle;
        guideBox.innerHTML = c.guide;
        btn.textContent = c.btn;
      }

      form.querySelectorAll('input[name="module"]').forEach((el) => {
        el.addEventListener("change", applyModuleUi);
      });
      applyModuleUi();
      const API_BASE = "https://deliveryreport.fly-work.com";
      statusRow.textContent =
        "Hazır. Excel’i seçin, modülü işaretleyin, ZIP indirin.";

      function show(text, ok) {
        msg.textContent = text;
        msg.className = "msg show " + (ok ? "ok" : "err");
      }

      fileInput.addEventListener("change", () => {
        selectedFile.textContent = fileInput.files?.[0]
          ? `Seçilen dosya: ${fileInput.files[0].name}`
          : "Henüz dosya seçilmedi";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.className = "msg";
        if (!fileInput.files?.length) {
          show("Lütfen önce bir Excel dosyası seçin.", false);
          return;
        }
        const fd = new FormData(form);
        const mod = fd.get("module") || "iade";
        setLoading(true);
        startMockProgress();
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = "Hazırlanıyor...";
        try {
          const res = await fetch(`${API_BASE}/api/generate`, { method: "POST", body: fd });
          if (!res.ok) {
            stopMockProgress();
            setProgressUI(Math.min(mockDisplayedPct, 35) || 12, "Sunucu yanıtı alındı…");
            const raw = await res.text();
            let err = "İstek başarısız.";
            try {
              const j = JSON.parse(raw);
              if (j && typeof j.error === "string" && j.error.trim()) err = j.error;
            } catch (_) {
              const t = raw.trim();
              if (t) err = t.length > 400 ? t.slice(0, 400) + "…" : t;
            }
            show(err, false);
            await sleep(220);
            return;
          }
          const blob = await res.blob();
          stopMockProgress();
          setProgressUI(100, "Hazır — ZIP indiriliyor…");
          await sleep(380);
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = mod === "teslim" ? copy.teslim.zip : copy.iade.zip;
          a.click();
          URL.revokeObjectURL(a.href);
          show("ZIP indirildi.", true);
        } catch (err) {
          stopMockProgress();
          setProgressUI(Math.min(mockDisplayedPct, 40) || 15, "Bağlantı kesildi…");
          await sleep(200);
          const isFetchError =
            err instanceof TypeError && String(err.message || "").toLowerCase().includes("fetch");
          if (isFetchError) {
            show(
              "Sunucuya ulaşılamadı. Bağlantınızı kontrol edip bir süre sonra yeniden deneyin.",
              false,
            );
          } else {
            show(String(err), false);
          }
        } finally {
          setLoading(false);
          btn.disabled = false;
          btn.textContent = originalText;
        }
      });
    </script>
  </body>
</html>
